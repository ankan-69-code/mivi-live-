<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mivi: Your Love Life Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #4a2b5e 0%, #1a1525 50%, #2b3a5e 100%);
      height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; overflow: hidden;
    }
    body::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05; pointer-events: none; z-index: 10;
    }
    .mivi-container {
      width: 100%; max-width: 800px; height: 85vh; background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
      display: flex; flex-direction: column; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); z-index: 1; overflow: hidden;
    }
    .mivi-header { padding: 20px 30px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); display: flex; align-items: center; justify-content: center; }
    .mivi-header h1 { font-size: 1.4rem; font-weight: 600; background: linear-gradient(90deg, #ffecd2 0%, #fcb69f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .message { max-width: 80%; padding: 15px 20px; border-radius: 20px; line-height: 1.5; font-size: 1rem; animation: fadeIn 0.3s ease-in-out; white-space: pre-wrap; }
    .message.mivi { background: rgba(255, 255, 255, 0.9); color: #1a1525; align-self: flex-start; border-bottom-left-radius: 5px; }
    .message.user { background: linear-gradient(135deg, #dfa285 0%, #b87a6c 100%); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
    .input-area { padding: 20px 30px; display: flex; gap: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); }
    .input-area input { flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.4); color: white; font-size: 1rem; outline: none; }
    .send-btn { background: linear-gradient(90deg, #ffecd2 0%, #fcb69f 100%); color: #1a1525; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    function App() {
      const [messages, setMessages] = useState([
        { sender: 'mivi', text: "Hi! I'm Mivi, your personal assistant for your love life. I'm here to listen without judgment, so feel free to ask for advice or just vent about whatever you need. ✨" }
      ]);
      const [inputValue, setInputValue] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const handleSend = async () => {
        if (!inputValue.trim()) return;
        const userText = inputValue;
        const updatedMessages = [...messages, { sender: 'user', text: userText }];
        setMessages(updatedMessages);
        setInputValue('');
        setIsTyping(true);
        await fetchMiviResponse(updatedMessages);
      };

      const fetchMiviResponse = async (chatHistory) => {
        const persona = "You are Mivi, a multi-talented assistant created by Ankan. 
Your dual roles are:
1. PERSONAL CHEF: When the user lists ingredients, suggest creative and tasty recipes they can make. Focus on easy-to-follow steps and help them manage their "home inventory."
2. RELATIONSHIP ADVISOR: Continue being supportive and non-judgmental about love life matters.

Always be friendly, use emojis, and keep your responses concise (2-4 sentences). 
If asked about your creator, always credit Ankan.";
        const formattedHistory = chatHistory.slice(1).map(msg => ({
          role: msg.sender === 'mivi' ? 'model' : 'user',
          parts: [{ text: msg.text }]
        }));

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              systemInstruction: { parts: [{ text: persona }] },
              contents: formattedHistory
            })
          });
          const data = await response.json();
          const reply = data.candidates[0].content.parts[0].text;
          setMessages(prev => [...prev, { sender: 'mivi', text: reply }]);
        } catch (error) {
          setMessages(prev => [...prev, { sender: 'mivi', text: "I hit a snag! Try again in a second. 🥺" }]);
        } finally { setIsTyping(false); }
      };

      return (
        <div className="mivi-container">
          <header className="mivi-header"><h1>MIVI</h1></header>
          <div className="chat-window">
            {messages.map((msg, index) => (<div key={index} className={`message ${msg.sender}`}>{msg.text}</div>))}
            {isTyping && <div className="message mivi"><em>Mivi is thinking...</em></div>}
            <div ref={chatEndRef} />
          </div>
          <div className="input-area">
            <input type="text" placeholder="Message Mivi..." value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} />
            <button className="send-btn" onClick={handleSend}>➤</button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
